name: CorePatch

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Set up JDK 21
      uses: actions/setup-java@v3
      with:
        java-version: 21
        distribution: 'temurin'
        cache: 'gradle'

    - name: Write key
      if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
      run: |
        if [ ! -z "${{ secrets.SIGNING_KEY }}" ]; then
        echo releaseStorePassword='${{ secrets.KEY_STORE_PASSWORD }}' >> gradle.properties
        echo releaseKeyAlias='${{ secrets.ALIAS }}' >> gradle.properties
        echo releaseKeyPassword='${{ secrets.KEY_PASSWORD }}' >> gradle.properties
        echo releaseStoreFile='key.jks' >> gradle.properties
        echo ${{ secrets.SIGNING_KEY }} | base64 --decode > key.jks
        fi

    - name: Build with Gradle
      run: ./gradlew assembleRelease assembleDebug

    - name: Rename APK
      if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
      run: |
        mv app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/CorePatch.apk
        mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/CorePatch-debug.apk

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: CorePatch
        path: app/build/outputs/apk
   
    - name: Release
      if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        files: app/build/outputs/apk/**/*.apk
        tag_name: CorePatch-4.9
        generate_release_notes: true
        make_latest: true
        replace_existing: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_
        TOKEN }}
